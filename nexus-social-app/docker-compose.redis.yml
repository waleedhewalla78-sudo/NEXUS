services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # AI worker: run locally with `npm run worker:dev` after Redis is up.
  # For production, use the worker bundle from the main Dockerfile build:
  #   node dist/bin/worker.js

volumes:
  redis_data:
