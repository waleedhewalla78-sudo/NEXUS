# Production OTEL collector — forwards traces to Sentry via SENTRY_DSN env var.
# Set SENTRY_DSN in .env.production (see .env.production.template).

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s

exporters:
  sentry:
    dsn: ${env:SENTRY_DSN}
    environment: ${env:SENTRY_ENVIRONMENT}
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [sentry, debug]
