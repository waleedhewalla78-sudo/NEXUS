# ============================================================
# Load tests (k6) — Nexus Social Platform
# ============================================================
# Manual dispatch against a running app (staging recommended).
# Local: npm run dev (port 3005) then run workflow with BASE_URL.
# ============================================================

name: Load Test (k6)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'App base URL (include scheme, no trailing slash)'
        required: true
        default: 'http://127.0.0.1:3005'
      script:
        description: 'k6 script under load-tests/'
        required: true
        default: 'smoke.js'
        type: choice
        options:
          - smoke.js
          - post-creation.js
          - calendar-fetch.js
          - ai-orchestration.js

jobs:
  k6:
    name: k6 load test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run k6
        working-directory: nexus-social-app
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
        run: k6 run load-tests/${{ github.event.inputs.script }}
