name: Nexus Social App CI

on:
  push:
    branches: [main]
    paths:
      - 'nexus-social-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'nexus-social-app/**'

defaults:
  run:
    working-directory: nexus-social-app

jobs:
  test-and-verify:
    name: Typecheck, unit tests, schema verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: nexus-social-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Schema verify (offline)
        run: npm run schema:verify

      - name: Dify verify (optional when secrets present)
        if: ${{ secrets.DIFY_API_KEY != '' }}
        continue-on-error: true
        env:
          DIFY_BASE_URL: ${{ secrets.DIFY_BASE_URL }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
        run: npm run ai:verify
